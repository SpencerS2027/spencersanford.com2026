<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Layout Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }
    
    .test-container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .status {
      padding: 15px;
      margin: 10px 0;
      border-radius: 5px;
      background: #f0f0f0;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    
    .info {
      padding: 10px;
      margin: 10px 0;
      background: #e7f3ff;
      border-left: 4px solid #2196F3;
    }
    
    /* Breakpoint indicators */
    body[data-breakpoint="mobile"] .breakpoint-indicator {
      background: #ff9800;
    }
    
    body[data-breakpoint="tablet"] .breakpoint-indicator {
      background: #2196F3;
    }
    
    body[data-breakpoint="desktop"] .breakpoint-indicator {
      background: #4CAF50;
    }
    
    .breakpoint-indicator {
      padding: 20px;
      margin: 20px 0;
      color: white;
      font-weight: bold;
      text-align: center;
      border-radius: 5px;
      transition: background 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="test-container">
    <h1>Responsive Layout Test</h1>
    
    <div class="info">
      <strong>Instructions:</strong> Resize your browser window to test breakpoint detection.
      <ul>
        <li>Mobile: &lt; 768px (Orange)</li>
        <li>Tablet: 768px - 1024px (Blue)</li>
        <li>Desktop: &gt; 1024px (Green)</li>
      </ul>
    </div>
    
    <div class="breakpoint-indicator">
      Current Breakpoint: <span id="current-breakpoint">Loading...</span>
    </div>
    
    <div id="test-results"></div>
    
    <div class="info">
      <strong>Current Window Width:</strong> <span id="window-width">-</span>px<br>
      <strong>Data Attribute:</strong> <code id="data-attribute">-</code>
    </div>
  </div>

  <script src="js/responsive.js"></script>
  <script>
    // Test suite for ResponsiveLayout
    const tests = [];
    
    function addTest(name, passed, message) {
      tests.push({ name, passed, message });
      updateTestResults();
    }
    
    function updateTestResults() {
      const resultsDiv = document.getElementById('test-results');
      resultsDiv.innerHTML = '<h2>Test Results</h2>';
      
      tests.forEach(test => {
        const statusDiv = document.createElement('div');
        statusDiv.className = `status ${test.passed ? 'success' : 'error'}`;
        statusDiv.innerHTML = `
          <strong>${test.passed ? '✓' : '✗'} ${test.name}</strong><br>
          ${test.message}
        `;
        resultsDiv.appendChild(statusDiv);
      });
    }
    
    function updateDisplay() {
      const width = window.innerWidth;
      const breakpoint = document.body.getAttribute('data-breakpoint');
      
      document.getElementById('window-width').textContent = width;
      document.getElementById('current-breakpoint').textContent = breakpoint || 'Not set';
      document.getElementById('data-attribute').textContent = breakpoint || 'Not set';
    }
    
    // Run tests after a short delay to ensure ResponsiveLayout is initialized
    setTimeout(() => {
      // Test 1: ResponsiveLayout object exists
      addTest(
        'ResponsiveLayout object exists',
        typeof ResponsiveLayout !== 'undefined',
        'ResponsiveLayout module is loaded and accessible'
      );
      
      // Test 2: Breakpoints are defined correctly
      const breakpointsCorrect = 
        ResponsiveLayout.breakpoints.mobile === 768 &&
        ResponsiveLayout.breakpoints.tablet === 1024;
      addTest(
        'Breakpoints defined correctly',
        breakpointsCorrect,
        `Mobile: ${ResponsiveLayout.breakpoints.mobile}px, Tablet: ${ResponsiveLayout.breakpoints.tablet}px`
      );
      
      // Test 3: data-breakpoint attribute is set
      const hasDataAttribute = document.body.hasAttribute('data-breakpoint');
      addTest(
        'data-breakpoint attribute set on body',
        hasDataAttribute,
        `Current value: ${document.body.getAttribute('data-breakpoint')}`
      );
      
      // Test 4: Breakpoint matches window width
      const width = window.innerWidth;
      const breakpoint = document.body.getAttribute('data-breakpoint');
      let expectedBreakpoint;
      
      if (width < 768) {
        expectedBreakpoint = 'mobile';
      } else if (width < 1024) {
        expectedBreakpoint = 'tablet';
      } else {
        expectedBreakpoint = 'desktop';
      }
      
      addTest(
        'Breakpoint matches window width',
        breakpoint === expectedBreakpoint,
        `Window: ${width}px, Expected: ${expectedBreakpoint}, Actual: ${breakpoint}`
      );
      
      // Test 5: debounce function exists
      addTest(
        'Debounce utility function exists',
        typeof ResponsiveLayout.debounce === 'function',
        'Debounce function is available for resize event throttling'
      );
      
      // Test 6: Resize listener test
      let resizeTriggered = false;
      const originalCheckBreakpoint = ResponsiveLayout.checkBreakpoint;
      ResponsiveLayout.checkBreakpoint = function() {
        resizeTriggered = true;
        originalCheckBreakpoint.call(this);
      };
      
      window.dispatchEvent(new Event('resize'));
      
      setTimeout(() => {
        addTest(
          'Resize event listener active',
          resizeTriggered,
          'Resize events trigger breakpoint checks'
        );
        
        // Restore original function
        ResponsiveLayout.checkBreakpoint = originalCheckBreakpoint;
      }, 300);
      
      updateDisplay();
    }, 100);
    
    // Update display on resize
    window.addEventListener('resize', () => {
      setTimeout(updateDisplay, 300);
    });
  </script>
</body>
</html>
